<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scouting App</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f7fa;
      color: #222;
    }
    .box {
      background: white;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    h1 {
      margin-top: 0;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    input, select, button {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      border: none;
      background: #5b2c83;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.92;
    }
    .green {
      background: #198754;
    }
    .blue {
      background: #0d6efd;
    }
    .grey {
      background: #6c757d;
    }
    #status {
      margin-top: 12px;
      font-weight: bold;
      color: #5b2c83;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
      background: white;
    }
    th, td {
      border-bottom: 1px solid #e6e6e6;
      padding: 8px 10px;
      font-size: 13px;
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: #f0f2f5;
    }
    .good {
      background: #d4edda;
      color: #155724;
      font-weight: bold;
      border-radius: 4px;
      padding: 2px 6px;
      display: inline-block;
    }
    .mid {
      background: #eef1f4;
      color: #333;
      font-weight: bold;
      border-radius: 4px;
      padding: 2px 6px;
      display: inline-block;
    }
    .bad {
      background: #f8d7da;
      color: #721c24;
      font-weight: bold;
      border-radius: 4px;
      padding: 2px 6px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Scouting App</h1>

    <input type="file" id="excelFiles" accept=".xlsx,.xls" multiple>

    <div class="row">
      <button onclick="loadExcels()">Cargar Excel(s)</button>
      <button class="green" onclick="saveToSupabase()">Guardar en Supabase</button>
      <button class="blue" onclick="loadFromSupabase()">Cargar desde Supabase</button>
      <button class="grey" onclick="clearFilters()">Limpiar filtros</button>
    </div>

    <div class="row">
      <select id="filterTeam" onchange="applyFilters()">
        <option value="">Equipo</option>
      </select>

      <select id="filterPosition" onchange="applyFilters()">
        <option value="">Posición</option>
      </select>

      <input type="number" id="filterMinAge" placeholder="Edad mín." oninput="applyFilters()">
      <input type="number" id="filterMaxAge" placeholder="Edad máx." oninput="applyFilters()">
      <input type="number" id="filterMinMinutes" placeholder="Minutos mín." oninput="applyFilters()">
      <input type="number" id="filterMinRating" placeholder="Rating mín." step="0.1" oninput="applyFilters()">
      <input type="number" id="filterMinWeighted" placeholder="Weighted mín." step="0.1" oninput="applyFilters()">

      <select id="sortBy" onchange="applyFilters()">
        <option value="weighted_rating">Ordenar por Weighted</option>
        <option value="rating">Ordenar por Rating</option>
        <option value="minutes">Ordenar por Minutos</option>
        <option value="age_asc">Edad ascendente</option>
        <option value="age_desc">Edad descendente</option>
        <option value="player">Nombre</option>
      </select>
    </div>

    <div id="status">Sin archivos cargados.</div>
    <div id="summary"></div>
  </div>

  <div class="box table-wrap">
    <table id="playersTable">
      <thead>
        <tr>
          <th>Player</th>
          <th>Team</th>
          <th>Age</th>
          <th>Minutes</th>
          <th>Position</th>
          <th>Rating</th>
          <th>Weighted</th>
          <th>Goals</th>
          <th>Assists</th>
          <th>xG</th>
          <th>xA</th>
          <th>Shots</th>
          <th>Prog Runs</th>
          <th>Dribbles</th>
          <th>Crosses</th>
          <th>Def Duels Won %</th>
          <th>Aerial Won %</th>
          <th>Passes Final 3rd</th>
          <th>Interceptions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let allPlayers = [];
    let currentPlayers = [];
    let supabase = null;

    const SUPABASE_URL = "sb_publishable_ktvDFCCVsG0PiQDTIGODKQ_EGvhXUMz";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1emNoeHJrcmx1b3N3bmptcndyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzAzMjUsImV4cCI6MjA5MTMwNjMyNX0.4yhjR3dYWu6-sfRhO4CYfIOGXMj-JmxsgA1ALgann7M";
    const SUPABASE_TABLE = "players_app";

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function initSupabase() {
      if (!SUPABASE_URL || !SUPABASE_KEY || SUPABASE_URL.indexOf("PON_AQUI") !== -1) {
        setStatus("Pon tu SUPABASE_URL y SUPABASE_KEY.");
        return false;
      }
      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        return true;
      } catch (e) {
        console.error(e);
        setStatus("Error iniciando Supabase.");
        return false;
      }
    }

    function toNumber(value) {
      if (value === null || value === undefined || value === "") return 0;
      if (typeof value === "number") return isNaN(value) ? 0 : value;
      const cleaned = String(value).replace(/%/g, "").replace(/,/g, ".").replace(/[^\d.-]/g, "");
      const num = parseFloat(cleaned);
      return isNaN(num) ? 0 : num;
    }

    function getValue(row, keys, defaultValue) {
      for (let i = 0; i < keys.length; i++) {
        const k = keys[i];
        if (row[k] !== undefined && row[k] !== null && row[k] !== "") return row[k];
      }
      return defaultValue;
    }

    function normalizeText(v) {
      return String(v || "").trim();
    }

    function detectMainPosition(rawPosition) {
  const pos = normalizeText(rawPosition).toUpperCase();
  if (!pos) return "UNKNOWN";

  if (
    pos.includes("RB") || pos.includes("RIGHT BACK")
  ) return "RB";

  if (
    pos.includes("LB") || pos.includes("LEFT BACK")
  ) return "LB";

  if (
    pos.includes("RCB") || pos.includes("LCB") || pos.includes("CB") ||
    pos.includes("CENTRE BACK") || pos.includes("CENTER BACK")
  ) return "CB";

  if (
    pos.includes("DMF") || pos.includes("CDM") || pos === "DM" ||
    pos.includes("DEFENSIVE MIDFIELDER")
  ) return "DMF";

  if (
    pos.includes("CMF") || pos.includes("MC") || pos === "CM" ||
    pos.includes("CENTRAL MIDFIELDER")
  ) return "MC";

  if (
    pos.includes("AMF") || pos.includes("CAM") || pos === "AM" ||
    pos.includes("ATTACKING MIDFIELDER")
  ) return "AMF";

  if (
    pos.includes("RW") || pos.includes("RWF") || pos.includes("RIGHT WINGER") || pos === "RM"
  ) return "RW";

  if (
    pos.includes("LW") || pos.includes("LWF") || pos.includes("LEFT WINGER") || pos === "LM"
  ) return "LW";

  if (
    pos.includes("CF") || pos.includes("ST") || pos.includes("FW") ||
    pos.includes("SS") || pos.includes("STRIKER") ||
    pos.includes("CENTRE FORWARD") || pos.includes("CENTER FORWARD")
  ) return "CF";

  return "UNKNOWN";
}

    function scoreFromRawMetric(value, min, max, inverse) {
      if (!isFinite(value)) return 4.5;
      let n = (value - min) / (max - min);
      n = Math.max(0, Math.min(1, n));
      if (inverse) n = 1 - n;
      return 4.5 + n * 3.5;
    }

    function scorePercent(value, min, max) {
      return scoreFromRawMetric(value, min, max, false);
    }

    function clampRating(v) {
      if (!isFinite(v)) return 4.5;
      return Math.max(4.5, Math.min(9.2, v));
    }

    function weightedAverage(pairs) {
      let total = 0;
      let weights = 0;
      for (let i = 0; i < pairs.length; i++) {
        const value = pairs[i][0];
        const weight = pairs[i][1];
        if (value > 0 && weight > 0) {
          total += value * weight;
          weights += weight;
        }
      }
      if (weights === 0) return 0;
      return total / weights;
    }

    function getPlayerRating(p) {
      const pos = p.main_position;

      if (pos === "RB" || pos === "LB") {
        return Number(clampRating(weightedAverage([
          [scorePercent(p.defensive_duels_won, 45, 75), 0.22],
          [scoreFromRawMetric(p.progressive_runs, 0.5, 5.5, false), 0.18],
          [scoreFromRawMetric(p.dribbles, 0.2, 4.2, false), 0.12],
          [scoreFromRawMetric(p.crosses, 0.2, 4.8, false), 0.14],
          [scoreFromRawMetric(p.passes_final_third, 0.5, 8, false), 0.10],
          [scoreFromRawMetric(p.interceptions, 0.5, 6.5, false), 0.10],
          [scorePercent(p.passes_acc, 72, 92), 0.07],
          [scorePercent(p.aerial_duels_won, 35, 70), 0.07]
        ])).toFixed(2));
      }

      if (pos === "CB") {
        return Number(clampRating(weightedAverage([
          [scorePercent(p.defensive_duels_won, 48, 75), 0.28],
          [scorePercent(p.aerial_duels_won, 48, 80), 0.22],
          [scoreFromRawMetric(p.interceptions, 1, 8, false), 0.16],
          [scoreFromRawMetric(p.p_adj_interceptions, 1, 10, false), 0.10],
          [scoreFromRawMetric(p.p_adj_tackles, 0.5, 6.5, false), 0.10],
          [scorePercent(p.passes_acc, 72, 95), 0.08],
          [scoreFromRawMetric(p.progressive_passes, 1, 9, false), 0.06]
        ])).toFixed(2));
      }

      if (pos === "DMF") {
        return Number(clampRating(weightedAverage([
          [scorePercent(p.defensive_duels_won, 48, 75), 0.20],
          [scoreFromRawMetric(p.interceptions, 1, 8.5, false), 0.18],
          [scoreFromRawMetric(p.recoveries, 2, 13, false), 0.12],
          [scorePercent(p.passes_acc, 78, 95), 0.12],
          [scoreFromRawMetric(p.progressive_passes, 1, 9, false), 0.12],
          [scoreFromRawMetric(p.passes_final_third, 0.5, 8.5, false), 0.10],
          [scorePercent(p.forward_passes_acc, 62, 90), 0.08],
          [scorePercent(p.long_passes_acc, 38, 75), 0.08]
        ])).toFixed(2));
      }

      if (pos === "MC") {
        return Number(clampRating(weightedAverage([
          [scoreFromRawMetric(p.progressive_passes, 1, 9, false), 0.16],
          [scoreFromRawMetric(p.passes_final_third, 1, 9, false), 0.16],
          [scoreFromRawMetric(p.key_passes, 0.1, 3, false), 0.12],
          [scoreFromRawMetric(p.through_passes, 0.05, 1.8, false), 0.10],
          [scorePercent(p.through_passes_acc, 20, 68), 0.08],
          [scorePercent(p.passes_acc, 74, 94), 0.10],
          [scoreFromRawMetric(p.interceptions, 0.5, 6.5, false), 0.10],
          [scorePercent(p.defensive_duels_won, 42, 70), 0.08],
          [scoreFromRawMetric(p.progressive_runs, 0.3, 3.2, false), 0.10]
        ])).toFixed(2));
      }

      if (pos === "AMF") {
        return Number(clampRating(weightedAverage([
          [scoreFromRawMetric(p.key_passes, 0.1, 3.2, false), 0.18],
          [scoreFromRawMetric(p.through_passes, 0.05, 1.8, false), 0.14],
          [scorePercent(p.through_passes_acc, 20, 68), 0.08],
          [scoreFromRawMetric(p.xa, 0.02, 0.32, false), 0.14],
          [scoreFromRawMetric(p.xg, 0.03, 0.35, false), 0.12],
          [scoreFromRawMetric(p.dribbles, 0.2, 4.5, false), 0.12],
          [scoreFromRawMetric(p.progressive_runs, 0.3, 4, false), 0.10],
          [scoreFromRawMetric(p.shots, 0.5, 4.2, false), 0.06],
          [scoreFromRawMetric(p.assists, 0.01, 0.30, false), 0.06]
        ])).toFixed(2));
      }

      if (pos === "RW" || pos === "LW") {
        return Number(clampRating(weightedAverage([
          [scoreFromRawMetric(p.dribbles, 0.3, 5.5, false), 0.18],
          [scoreFromRawMetric(p.progressive_runs, 0.5, 6, false), 0.16],
          [scoreFromRawMetric(p.touches_box, 0.3, 5.5, false), 0.12],
          [scoreFromRawMetric(p.xa, 0.02, 0.28, false), 0.10],
          [scoreFromRawMetric(p.xg, 0.03, 0.32, false), 0.10],
          [scoreFromRawMetric(p.crosses, 0.2, 5, false), 0.08],
          [scoreFromRawMetric(p.key_passes, 0.1, 3, false), 0.08],
          [scoreFromRawMetric(p.shots, 0.5, 4.2, false), 0.08],
          [scoreFromRawMetric(p.assists, 0.01, 0.30, false), 0.10]
        ])).toFixed(2));
      }

      if (pos === "CF") {
        return Number(clampRating(weightedAverage([
          [scoreFromRawMetric((p.non_penalty_goals || p.goals), 0.05, 0.65, false), 0.30],
          [scoreFromRawMetric(p.xg, 0.05, 0.65, false), 0.20],
          [scoreFromRawMetric(p.shots, 0.8, 5.5, false), 0.16],
          [scoreFromRawMetric(p.touches_box, 0.5, 8, false), 0.12],
          [scoreFromRawMetric(p.progressive_runs, 0.2, 3.8, false), 0.08],
          [scoreFromRawMetric(p.dribbles, 0.1, 3, false), 0.05],
          [scoreFromRawMetric(p.xa, 0.01, 0.18, false), 0.03],
          [scorePercent(p.aerial_duels_won, 30, 75), 0.04],
          [scoreFromRawMetric(p.top_speed, 28, 36, false), 0.02]
        ])).toFixed(2));
      }

      return 6.0;
    }

    function getWeightedRating(p) {
      const rating = toNumber(p.rating);
      const leagueFactor = toNumber(p.league_factor) || 1;
      const adaptation = toNumber(p.adaptation_score) || 50;
      let weighted = rating + ((leagueFactor - 1) * 0.8);
      weighted += ((adaptation - 50) / 50) * 0.2;
      return Number(clampRating(weighted).toFixed(2));
    }

    function buildPlayerObject(row) {
  const rawPosition = getValue(row, ["Position", "Positions", "Posición", "Role"], "");
  const mainPosition = detectMainPosition(rawPosition);

  const p = {
    player: normalizeText(getValue(row, ["Player", "Player name", "Name", "Jugador"], "")),
    team: normalizeText(getValue(row, ["Team", "Club", "Equipo"], "")),
    age: toNumber(getValue(row, ["Age", "Edad"], 0)),
    minutes: toNumber(getValue(row, ["Minutes played", "Minutes", "Minutos", "Playing time"], 0)),
    foot: normalizeText(getValue(row, ["Foot", "Preferred foot", "Pie"], "")),
    raw_position: rawPosition,
    main_position: mainPosition,

    goals: toNumber(getValue(row, ["Goals", "Goles", "Goals per 90"], 0)),
    assists: toNumber(getValue(row, ["Assists", "Asistencias", "Assists per 90"], 0)),
    xg: toNumber(getValue(row, ["xG", "Expected goals", "xG per 90"], 0)),
    xa: toNumber(getValue(row, ["xA", "Expected assists", "xA per 90"], 0)),
    shots: toNumber(getValue(row, ["Shots", "Shots per 90", "Remates", "Shots total"], 0)),
    progressive_runs: toNumber(getValue(row, ["Progressive runs per 90", "Progressive runs", "Carries progressive per 90", "Progressive carries per 90"], 0)),
    dribbles: toNumber(getValue(row, ["Dribbles per 90", "Dribbles", "Successful dribbles per 90"], 0)),
    crosses: toNumber(getValue(row, ["Crosses per 90", "Crosses", "Accurate crosses per 90"], 0)),
    defensive_duels_won: toNumber(getValue(row, ["Defensive duels won, %", "Defensive duels won %"], 0)),
    aerial_duels_won: toNumber(getValue(row, ["Aerial duels won, %", "Aerial duels won %"], 0)),
    interceptions: toNumber(getValue(row, ["Interceptions per 90", "Interceptions"], 0)),
    passes_final_third: toNumber(getValue(row, ["Passes to final third per 90", "Passes final third per 90", "Passes to final third"], 0)),
    passes_acc: toNumber(getValue(row, ["Accurate passes, %", "Pass accuracy, %"], 0)),
    progressive_passes: toNumber(getValue(row, ["Progressive passes per 90", "Progressive passes"], 0)),
    through_passes: toNumber(getValue(row, ["Through passes per 90", "Through passes"], 0)),
    through_passes_acc: toNumber(getValue(row, ["Accurate through passes, %", "Through passes accuracy, %"], 0)),
    key_passes: toNumber(getValue(row, ["Key passes per 90", "Key passes"], 0)),
    touches_box: toNumber(getValue(row, ["Touches in box per 90", "Touches in penalty area per 90"], 0)),
    non_penalty_goals: toNumber(getValue(row, ["Non-penalty goals", "Non-penalty goals per 90"], 0)),
    top_speed: toNumber(getValue(row, ["Top speed", "Maximum speed", "Sprint speed"], 0)),
    recoveries: toNumber(getValue(row, ["Recoveries per 90", "Ball recoveries per 90"], 0)),
    long_passes_acc: toNumber(getValue(row, ["Accurate long passes, %", "Long passes accuracy, %"], 0)),
    forward_passes_acc: toNumber(getValue(row, ["Accurate forward passes, %", "Forward passes accuracy, %"], 0)),
    p_adj_tackles: toNumber(getValue(row, ["PAdj Sliding tackles", "PAdj tackles", "PAdj sliding tackles"], 0)),
    p_adj_interceptions: toNumber(getValue(row, ["PAdj Interceptions", "PAdj interceptions"], 0)),
    league_factor: toNumber(getValue(row, ["league_factor", "League Factor", "Factor Liga"], 1)) || 1,
    adaptation_score: toNumber(getValue(row, ["adaptation_score_final", "adaptation_score", "Adaptation Score", "Adaptation"], 50)) || 50
  };

  if (!p.player) return null;

  if (p.main_position === "UNKNOWN") {
    if (p.raw_position) {
      console.log("Posición no reconocida:", p.raw_position, "Jugador:", p.player);
    }
  }

  p.rating = getPlayerRating(p);
  p.weighted_rating = getWeightedRating(p);
  p.external_id = (p.player + "__" + p.team + "__" + p.main_position).toLowerCase();

  return p;
}

    async function loadExcels() {
  const input = document.getElementById("excelFiles");
  const files = input.files;

  if (!files || files.length === 0) {
    alert("Selecciona al menos un Excel.");
    return;
  }

  setStatus("Cargando Excel...");
  allPlayers = [];

  try {
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data, { type: "array" });

      console.log("Archivo:", file.name);
      console.log("Hojas:", workbook.SheetNames);

      for (let s = 0; s < workbook.SheetNames.length; s++) {
        const sheetName = workbook.SheetNames[s];
        const worksheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

        console.log("Hoja:", sheetName, "Filas:", rows.length);

        for (let r = 0; r < rows.length; r++) {
          const p = buildPlayerObject(rows[r]);
          if (p && p.player) {
            allPlayers.push(p);
          }
        }
      }
    }

    if (!allPlayers.length) {
      setStatus("Se leyó el Excel pero no se detectó ningún jugador.");
      alert("El Excel se ha leído, pero no he detectado jugadores. Abre F12 > Console y mira qué nombre tienen tus columnas.");
      return;
    }

    allPlayers = deduplicatePlayers(allPlayers);
    currentPlayers = allPlayers.slice();
    populateFilters(allPlayers);
    applyFilters();

    setStatus("Excel cargado: " + allPlayers.length + " jugadores.");
  } catch (e) {
    console.error(e);
    setStatus("Error al cargar Excel.");
    alert("Error al cargar Excel. Mira F12 > Console.");
  }
}

    async function saveToSupabase() {
      if (!allPlayers.length) {
        alert("Primero carga el Excel.");
        return;
      }

      if (!supabase && !initSupabase()) return;

      setStatus("Guardando en Supabase...");

      try {
        const batchSize = 500;

        for (let i = 0; i < allPlayers.length; i += batchSize) {
          const batch = allPlayers.slice(i, i + batchSize).map(function(p) {
            return {
              external_id: p.external_id,
              player: p.player,
              team: p.team,
              age: p.age,
              minutes: p.minutes,
              foot: p.foot,
              raw_position: p.raw_position,
              main_position: p.main_position,
              goals: p.goals,
              assists: p.assists,
              xg: p.xg,
              xa: p.xa,
              shots: p.shots,
              progressive_runs: p.progressive_runs,
              dribbles: p.dribbles,
              crosses: p.crosses,
              defensive_duels_won: p.defensive_duels_won,
              aerial_duels_won: p.aerial_duels_won,
              interceptions: p.interceptions,
              passes_final_third: p.passes_final_third,
              league_factor: p.league_factor,
              adaptation_score: p.adaptation_score,
              rating: p.rating,
              weighted_rating: p.weighted_rating
            };
          });

          const result = await supabase
            .from(SUPABASE_TABLE)
            .upsert(batch, { onConflict: "external_id" });

          if (result.error) throw result.error;
        }

        setStatus("Guardado correcto en Supabase: " + allPlayers.length + " jugadores.");
      } catch (e) {
        console.error(e);
        setStatus("Error guardando en Supabase.");
      }
    }

    async function loadFromSupabase() {
      if (!supabase && !initSupabase()) return;

      setStatus("Cargando desde Supabase...");

      try {
        let from = 0;
        const pageSize = 1000;
        let rows = [];
        let keepLoading = true;

        while (keepLoading) {
          const result = await supabase
            .from(SUPABASE_TABLE)
            .select("*")
            .range(from, from + pageSize - 1);

          if (result.error) throw result.error;

          if (!result.data || result.data.length === 0) {
            keepLoading = false;
          } else {
            rows = rows.concat(result.data);
            from += pageSize;
            if (result.data.length < pageSize) keepLoading = false;
          }
        }

        allPlayers = rows.map(function(row) {
          return {
            player: row.player || "",
            team: row.team || "",
            age: toNumber(row.age),
            minutes: toNumber(row.minutes),
            foot: row.foot || "",
            raw_position: row.raw_position || "",
            main_position: row.main_position || "",
            goals: toNumber(row.goals),
            assists: toNumber(row.assists),
            xg: toNumber(row.xg),
            xa: toNumber(row.xa),
            shots: toNumber(row.shots),
            progressive_runs: toNumber(row.progressive_runs),
            dribbles: toNumber(row.dribbles),
            crosses: toNumber(row.crosses),
            defensive_duels_won: toNumber(row.defensive_duels_won),
            aerial_duels_won: toNumber(row.aerial_duels_won),
            interceptions: toNumber(row.interceptions),
            passes_final_third: toNumber(row.passes_final_third),
            passes_acc: toNumber(row.passes_acc),
            progressive_passes: toNumber(row.progressive_passes),
            through_passes: toNumber(row.through_passes),
            through_passes_acc: toNumber(row.through_passes_acc),
            key_passes: toNumber(row.key_passes),
            touches_box: toNumber(row.touches_box),
            non_penalty_goals: toNumber(row.non_penalty_goals),
            top_speed: toNumber(row.top_speed),
            recoveries: toNumber(row.recoveries),
            long_passes_acc: toNumber(row.long_passes_acc),
            forward_passes_acc: toNumber(row.forward_passes_acc),
            p_adj_tackles: toNumber(row.p_adj_tackles),
            p_adj_interceptions: toNumber(row.p_adj_interceptions),
            league_factor: toNumber(row.league_factor || 1),
            adaptation_score: toNumber(row.adaptation_score || 50),
            rating: toNumber(row.rating),
            weighted_rating: toNumber(row.weighted_rating),
            external_id: row.external_id || ""
          };
        });

        currentPlayers = allPlayers.slice();
        populateFilters(allPlayers);
        applyFilters();
        setStatus("Datos cargados desde Supabase: " + allPlayers.length + " jugadores.");
      } catch (e) {
        console.error(e);
        setStatus("Error cargando desde Supabase.");
      }
    }

    function deduplicatePlayers(players) {
      const map = new Map();
      for (let i = 0; i < players.length; i++) {
        const p = players[i];
        const key = p.external_id || (p.player + "__" + p.team + "__" + p.main_position);
        if (!map.has(key)) {
          map.set(key, p);
        } else {
          const existing = map.get(key);
          if (p.minutes > existing.minutes) {
            map.set(key, p);
          }
        }
      }
      return Array.from(map.values());
    }

    function uniqueSorted(values) {
      const clean = values.filter(function(v) {
        return v !== null && v !== undefined && v !== "";
      });
      return Array.from(new Set(clean)).sort(function(a, b) {
        return String(a).localeCompare(String(b), "es", { sensitivity: "base" });
      });
    }

    function populateSelect(id, values, firstLabel) {
      const select = document.getElementById(id);
      select.innerHTML = '<option value="">' + firstLabel + '</option>';
      for (let i = 0; i < values.length; i++) {
        const option = document.createElement("option");
        option.value = values[i];
        option.textContent = values[i];
        select.appendChild(option);
      }
    }

    function populateFilters(players) {
      populateSelect("filterTeam", uniqueSorted(players.map(function(p) { return p.team; })), "Equipo");

      const orderedPositions = ["RB", "LB", "CB", "DMF", "MC", "AMF", "RW", "LW", "CF"];
      const existing = new Set(players.map(function(p) { return p.main_position; }));
      const finalPositions = orderedPositions.filter(function(pos) { return existing.has(pos); });
      populateSelect("filterPosition", finalPositions, "Posición");
    }

    function sortPlayers(players, sortBy) {
      const arr = players.slice();

      arr.sort(function(a, b) {
        if (sortBy === "rating") return b.rating - a.rating;
        if (sortBy === "weighted_rating") return b.weighted_rating - a.weighted_rating;
        if (sortBy === "minutes") return b.minutes - a.minutes;
        if (sortBy === "age_asc") return a.age - b.age;
        if (sortBy === "age_desc") return b.age - a.age;
        if (sortBy === "player") return a.player.localeCompare(b.player, "es", { sensitivity: "base" });
        return b.weighted_rating - a.weighted_rating;
      });

      return arr;
    }

    function applyFilters() {
      const team = document.getElementById("filterTeam").value;
      const position = document.getElementById("filterPosition").value;
      const minAge = toNumber(document.getElementById("filterMinAge").value);
      const maxAge = toNumber(document.getElementById("filterMaxAge").value);
      const minMinutes = toNumber(document.getElementById("filterMinMinutes").value);
      const minRating = toNumber(document.getElementById("filterMinRating").value);
      const minWeighted = toNumber(document.getElementById("filterMinWeighted").value);
      const sortBy = document.getElementById("sortBy").value;

      let filtered = allPlayers.filter(function(p) {
        const okTeam = !team || p.team === team;
        const okPosition = !position || p.main_position === position;
        const okMinAge = !minAge || p.age >= minAge;
        const okMaxAge = !maxAge || p.age <= maxAge;
        const okMinutes = !minMinutes || p.minutes >= minMinutes;
        const okRating = !minRating || p.rating >= minRating;
        const okWeighted = !minWeighted || p.weighted_rating >= minWeighted;
        return okTeam && okPosition && okMinAge && okMaxAge && okMinutes && okRating && okWeighted;
      });

      filtered = sortPlayers(filtered, sortBy);
      currentPlayers = filtered.slice();
      renderTable(filtered);
      renderSummary(filtered);
    }

    function clearFilters() {
      document.getElementById("filterTeam").value = "";
      document.getElementById("filterPosition").value = "";
      document.getElementById("filterMinAge").value = "";
      document.getElementById("filterMaxAge").value = "";
      document.getElementById("filterMinMinutes").value = "";
      document.getElementById("filterMinRating").value = "";
      document.getElementById("filterMinWeighted").value = "";
      document.getElementById("sortBy").value = "weighted_rating";
      applyFilters();
    }

    function formatNum(value) {
      const n = toNumber(value);
      if (!n) return "";
      return n % 1 === 0 ? String(n) : n.toFixed(2);
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function ratingBadge(value) {
      if (value >= 8.6) return '<span class="good">' + value.toFixed(2) + '</span>';
      if (value < 6.4) return '<span class="bad">' + value.toFixed(2) + '</span>';
      return '<span class="mid">' + value.toFixed(2) + '</span>';
    }

    function renderTable(players) {
      const tbody = document.querySelector("#playersTable tbody");
      tbody.innerHTML = "";

      for (let i = 0; i < players.length; i++) {
        const p = players[i];
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + escapeHtml(p.player) + "</td>" +
          "<td>" + escapeHtml(p.team) + "</td>" +
          "<td>" + (p.age || "") + "</td>" +
          "<td>" + Math.round(p.minutes || 0) + "</td>" +
          "<td>" + escapeHtml(p.main_position) + "</td>" +
          "<td>" + ratingBadge(toNumber(p.rating)) + "</td>" +
          "<td>" + ratingBadge(toNumber(p.weighted_rating)) + "</td>" +
          "<td>" + formatNum(p.goals) + "</td>" +
          "<td>" + formatNum(p.assists) + "</td>" +
          "<td>" + formatNum(p.xg) + "</td>" +
          "<td>" + formatNum(p.xa) + "</td>" +
          "<td>" + formatNum(p.shots) + "</td>" +
          "<td>" + formatNum(p.progressive_runs) + "</td>" +
          "<td>" + formatNum(p.dribbles) + "</td>" +
          "<td>" + formatNum(p.crosses) + "</td>" +
          "<td>" + formatNum(p.defensive_duels_won) + "</td>" +
          "<td>" + formatNum(p.aerial_duels_won) + "</td>" +
          "<td>" + formatNum(p.passes_final_third) + "</td>" +
          "<td>" + formatNum(p.interceptions) + "</td>";
        tbody.appendChild(tr);
      }
    }

    function renderSummary(players) {
      const summary = document.getElementById("summary");
      if (!players.length) {
        summary.innerHTML = "No hay jugadores con los filtros actuales.";
        return;
      }
      const avgRating = players.reduce(function(sum, p) { return sum + toNumber(p.rating); }, 0) / players.length;
      const avgWeighted = players.reduce(function(sum, p) { return sum + toNumber(p.weighted_rating); }, 0) / players.length;
      summary.innerHTML = "Jugadores mostrados: <b>" + players.length + "</b> | Rating medio: <b>" + avgRating.toFixed(2) + "</b> | Weighted medio: <b>" + avgWeighted.toFixed(2) + "</b>";
    }
  </script>
</body>
</html>
