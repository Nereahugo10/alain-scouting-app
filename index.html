<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

let allPlayers = [];
let supabase = null;

const SUPABASE_URL = "sb_publishable_ktvDFCCVsG0PiQDTIGODKQ_EGvhXUMz";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1emNoeHJrcmx1b3N3bmptcndyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzAzMjUsImV4cCI6MjA5MTMwNjMyNX0.4yhjR3dYWu6-sfRhO4CYfIOGXMj-JmxsgA1ALgann7M";
const SUPABASE_TABLE = "players_app";

/* INIT SUPABASE */
function initSupabase() {
  if (!SUPABASE_URL || !SUPABASE_KEY) {
    alert("Falta Supabase config");
    return false;
  }
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return true;
}

/* UTILS */
function toNumber(v) {
  if (!v) return 0;
  return Number(String(v).replace(",", ".").replace("%", "")) || 0;
}

/* RATING CONTROLADO */
function score(v, min, max) {
  let n = (v - min) / (max - min);
  n = Math.max(0, Math.min(1, n));
  return 4.5 + n * 3.5;
}

function clamp(v) {
  return Math.max(4.5, Math.min(9.2, v));
}

/* RATING */
function getRating(p) {
  let r =
    score(p.goals, 0, 0.7) * 0.35 +
    score(p.xg, 0, 0.7) * 0.25 +
    score(p.shots, 0, 6) * 0.15 +
    score(p.dribbles, 0, 5) * 0.10 +
    score(p.runs, 0, 5) * 0.15;

  return Number(clamp(r).toFixed(2));
}

/* WEIGHTED */
function getWeighted(p) {
  let w = p.rating + (p.league_factor - 1) * 0.8;
  w += ((p.adaptation - 50) / 50) * 0.2;
  return Number(clamp(w).toFixed(2));
}

/* BUILD PLAYER */
function build(row) {
  let p = {
    player: row.Player || "",
    team: row.Team || "",
    league: row.League || "",
    age: toNumber(row.Age),
    minutes: toNumber(row["Minutes played"]),
    goals: toNumber(row.Goals),
    xg: toNumber(row.xG),
    shots: toNumber(row.Shots),
    dribbles: toNumber(row["Dribbles per 90"]),
    runs: toNumber(row["Progressive runs per 90"]),
    league_factor: 1,
    adaptation: 50
  };

  p.rating = getRating(p);
  p.weighted = getWeighted(p);
  p.external_id = (p.player + "_" + p.team).toLowerCase();

  return p;
}

/* LOAD EXCEL */
async function loadExcels() {
  const files = document.getElementById("excelFiles").files;
  if (!files.length) return alert("Carga Excel");

  allPlayers = [];

  for (const f of files) {
    const data = await f.arrayBuffer();
    const wb = XLSX.read(data, { type: "array" });

    wb.SheetNames.forEach(s => {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[s]);

      rows.forEach(r => {
        const p = build(r);
        if (p.player) allPlayers.push(p);
      });
    });
  }

  render(allPlayers);
}

/* SAVE */
async function saveToSupabase() {
  if (!supabase && !initSupabase()) return;

  const { error } = await supabase
    .from(SUPABASE_TABLE)
    .upsert(allPlayers, { onConflict: "external_id" });

  if (error) {
    console.error(error);
    alert("Error guardando");
  } else {
    alert("Guardado OK");
  }
}

/* LOAD */
async function loadFromSupabase() {
  if (!supabase && !initSupabase()) return;

  const { data, error } = await supabase
    .from(SUPABASE_TABLE)
    .select("*");

  if (error) {
    console.error(error);
    alert("Error cargando");
    return;
  }

  allPlayers = data;
  render(allPlayers);
}

/* TABLE */
function render(players) {
  const tbody = document.querySelector("#playersTable tbody");
  tbody.innerHTML = "";

  players.forEach(p => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.player}</td>
      <td>${p.team}</td>
      <td>${p.league}</td>
      <td>${p.age}</td>
      <td>${p.minutes}</td>
      <td>${p.rating}</td>
      <td>${p.weighted}</td>
    `;
    tbody.appendChild(tr);
  });
}

</script>
