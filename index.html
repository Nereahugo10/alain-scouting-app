<!-- =========================
AL AIN SCOUTING PRO + SUPABASE
========================= -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL AIN SCOUTING PRO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#0b0f1a;
  color:white;
  margin:0;
}
.container{padding:20px;}
button{padding:10px;margin:5px;background:#5b8cff;color:white;border:none;border-radius:6px;}
input,select{padding:8px;margin:5px;background:#111;color:white;border:1px solid #333;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{padding:8px;border-bottom:1px solid #222;}
.good{color:#22c55e;}
.mid{color:#f59e0b;}
.bad{color:#ef4444;}
</style>
</head>

<body>
<div class="container">

<h2>AL AIN SCOUTING PRO</h2>

<input type="file" id="file">

<button onclick="saveSupabase()">Guardar en Supabase</button>
<button onclick="loadSupabase()">Cargar desde Supabase</button>

<br>

<input id="url" placeholder="SUPABASE URL">
<input id="key" placeholder="SUPABASE KEY">

<table id="table">
<thead>
<tr>
<th>Player</th>
<th>Team</th>
<th>Pos</th>
<th>Age</th>
<th>Rating</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

let players=[]
let supabase=null

function initSupabase(){
  const url=document.getElementById("url").value
  const key=document.getElementById("key").value
  supabase=window.supabase.createClient(url,key)
}

document.getElementById("file").addEventListener("change",function(e){
  const file=e.target.files[0]
  const reader=new FileReader()

  reader.onload=function(evt){
    const data=new Uint8Array(evt.target.result)
    const wb=XLSX.read(data,{type:"array"})
    const ws=wb.Sheets[wb.SheetNames[0]]
    const json=XLSX.utils.sheet_to_json(ws)

    players=json.map(p=>({
      player:p.Player||"",
      team:p.Team||"",
      pos:p.Position||"",
      age:Number(p.Age)||0,
      rating:Math.random()*4+5
    }))

    render()
  }

  reader.readAsArrayBuffer(file)
})

function render(){
  const tbody=document.querySelector("#table tbody")
  tbody.innerHTML=""

  players.forEach(p=>{
    const tr=document.createElement("tr")

    tr.innerHTML=`
      <td>${p.player}</td>
      <td>${p.team}</td>
      <td>${p.pos}</td>
      <td>${p.age}</td>
      <td class="${getColor(p.rating)}">${p.rating.toFixed(2)}</td>
    `

    tbody.appendChild(tr)
  })
}

function getColor(r){
  if(r>8) return "good"
  if(r>6.5) return "mid"
  return "bad"
}

/* =======================
SUPABASE
======================= */

async function saveSupabase(){
  initSupabase()

  const data=players.map(p=>({
    player:p.player,
    team:p.team,
    pos:p.pos,
    age:p.age,
    rating:p.rating
  }))

  await supabase.from("players").insert(data)

  alert("Guardado en Supabase")
}

async function loadSupabase(){
  initSupabase()

  const {data}=await supabase.from("players").select("*")

  players=data
  render()

  alert("Cargado desde Supabase")
}

</script>
</body>
</html>
